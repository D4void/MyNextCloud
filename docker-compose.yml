# Docker compose file to run apache Nextcloud container along with a Mariadb and Redis container.
#
# Create .env file before starting. (check env.example) and create volume directories (init-voldir.sh)
# Traefik Label are used to reach the server from Internet through https. Refer to MyTraefik project.
#
# I run this with a global compose : MyDockerApps which include Traefik and this Nextcloud compose file.
# d4void/nextcloud is the official image I build myself from the release but with smbclient included (check dockerfile)
#
# Added resource limits for local Docker Compose (cpus & mem_limit).
#  Nextcloud can be very resource-intensive.
#  For use with a Swarm setup, these limits should be defined under deploy/resources/limits (cpus & memory).

services:

  nc-db:
    image: mariadb:${MARIA_TAG}
    container_name: nc-db
    cpus: 0.7
    mem_limit: 3g
    depends_on:
      - traefik
    restart: unless-stopped
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    networks:
      - ncnet
    volumes:
      - nc_maria_data:/var/lib/mysql
      - type: tmpfs
        target: /dev/shm
    environment:
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_RANDOM_ROOT_PASSWORD=yes
      - MARIADB_AUTO_UPGRADE=1
      - MARIADB_DISABLE_UPGRADE_BACKUP=1
  
  nc-redis:
    image: redis:${REDIS_TAG}
    container_name: nc-redis
    cpus: 0.25
    mem_limit: 512m
    depends_on:
      - traefik
    restart: unless-stopped
    networks:
      - ncnet
    volumes:
      - nc_redis_data:/data
  
  nc-collabora:
    image: collabora/code:${CODE_TAG}
    container_name: nc-collabora
    cpus: 0.5
    mem_limit: 1g
    depends_on:
      - traefik
    restart: unless-stopped
    cap_add:
      - MKNOD
      - SYS_CHROOT
      - SYS_ADMIN
      - FOWNER
      - CHOWN
    networks:
      - ncnet
      - default
    extra_hosts:
      - "${NEXTCLOUD_FQDN}:${TRAEFIK_IP}"
    volumes:
      # Mount child-roots as tmpfs so kit chroot setup is in-memory.
      # After long idle periods the OS evicts systemplate pages from cache;
      # writing to tmpfs (vs overlayfs) reduces the cold-start linking time
      # and avoids hitting the per_document.limit_load_secs timeout.
      - type: tmpfs
        target: /opt/cool/child-roots
      # Mount local TrueType fonts so the container can use system fonts
      # (e.g. Microsoft fonts like Arial, Calibri, Cambria by installing the `ttf-mscorefonts-installer` package).
      - /usr/share/fonts/truetype:/usr/share/fonts/truetype/more:ro
      - /usr/share/fonts/truetype:/opt/cool/systemplate/usr/share/fonts/truetype/more:ro
    environment:
      - domain=${COLLABORA_DOMAIN}
      - aliasgroup1=https://${NEXTCLOUD_FQDN}
      - username=${COLLABORA_USERNAME}
      - password=${COLLABORA_PASSWORD}
      - DONT_GEN_SSL_CERT="YES"
      # Increased limit_load_secs (default 100s) to tolerate cold page-cache on
      # first document open after several hours of idle (kit linking from systemplate).
      - >-
        extra_params=
        --o:ssl.enable=false
        --o:ssl.termination=true
        --o:user_interface.use_integration_theme=false
        --o:per_document.limit_load_secs=300
        --o:num_prespawn_children=3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9980/hosting/discovery"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s
    entrypoint: [ '/bin/bash', '-c' ]
    command: [ 'coolconfig generate-proof-key && /start-collabora-online.sh' ]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=MyTraefikNet"
      - "traefik.http.routers.collaboracontainer.rule=Host(`${COLLABORA_FQDN}`)"
      - "traefik.http.routers.collaboracontainer.entrypoints=web"
      - "traefik.http.routers.collaboracontainer.middlewares=collaboracontainer-redirect-secure"
      - "traefik.http.middlewares.collaboracontainer-redirect-secure.redirectscheme.scheme=https"
      - "traefik.http.routers.collaboracontainer-secure.rule=Host(`${COLLABORA_FQDN}`)"
      - "traefik.http.routers.collaboracontainer-secure.entrypoints=websecure"
      - "traefik.http.routers.collaboracontainer-secure.tls=true"
      - "traefik.http.routers.collaboracontainer-secure.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.collaboracontainer-secure.middlewares=security@file"
      - "traefik.http.routers.collaboracontainer-secure.service=mycollaboraservice"
      - "traefik.http.services.mycollaboraservice.loadbalancer.server.port=9980"


  nc-nextcloud:
    image: d4void/nextcloud:${NEXTCLOUD_TAG}
    container_name: nc-nextcloud
    cpus: 0.7
    mem_limit: 3g    
    depends_on:
      traefik:
        condition: service_started
      nc-db:
        condition: service_started
      nc-redis:
        condition: service_started
      nc-collabora:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ncnet
      - default
    extra_hosts:
      - "${COLLABORA_FQDN}:${TRAEFIK_IP}"
    volumes:
      - nc_app:/var/www/html
      - nc_config:/var/www/html/config
      - nc_custom_apps:/var/www/html/custom_apps
      - nc_data:/var/www/html/data
    environment:
      - MYSQL_USER=${MARIADB_USER}
      - MYSQL_PASSWORD=${MARIADB_PASSWORD}
      - MYSQL_DATABASE=${MARIADB_DATABASE}
      - MYSQL_HOST=nc-db
      - REDIS_HOST=nc-redis
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=MyTraefikNet"
      - "traefik.http.routers.nextcloudcontainer.rule=Host(`${NEXTCLOUD_FQDN}`)"
      - "traefik.http.routers.nextcloudcontainer.entrypoints=web"
      - "traefik.http.routers.nextcloudcontainer.middlewares=nextcloudcontainer-redirect-secure"
      - "traefik.http.middlewares.nextcloudcontainer-redirect-secure.redirectscheme.scheme=https"
      - "traefik.http.routers.nextcloudcontainer-secure.rule=Host(`${NEXTCLOUD_FQDN}`)"
      - "traefik.http.routers.nextcloudcontainer-secure.entrypoints=websecure"
      - "traefik.http.routers.nextcloudcontainer-secure.tls=true"
      - "traefik.http.routers.nextcloudcontainer-secure.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.nextcloudcontainer-secure.middlewares=security@file"
      - "traefik.http.routers.nextcloudcontainer-secure.service=mynextcloudservice"
      - "traefik.http.services.mynextcloudservice.loadbalancer.server.port=80"
      - "traefik.http.services.mynextcloudservice.loadbalancer.server.scheme=http"

  nc-cron:
    image: d4void/nextcloud:${NEXTCLOUD_TAG}
    container_name: nc-cron
    cpus: 0.7
    mem_limit: 3g    
    depends_on:
      - traefik
      - nc-db
      - nc-redis
      - nc-nextcloud
    restart: unless-stopped
    networks:
      - ncnet
      - default
    volumes:
      - nc_app:/var/www/html
      - nc_config:/var/www/html/config
      - nc_custom_apps:/var/www/html/custom_apps
      - nc_data:/var/www/html/data
    environment:
      - MYSQL_HOST=nc-db
      - REDIS_HOST=nc-redis
    entrypoint: /cron.sh

volumes:
  nc_maria_data:
    driver: local
    driver_opts:
      type: none
      device: ${NC_VOL}/var-lib-mysql
      o: bind
  nc_redis_data:
    driver: local
    driver_opts:
      type: none
      device: ${NC_VOL}/redis_data
      o: bind
  nc_app:
    driver: local
    driver_opts:
      type: none
      device: ${NC_VOL}/app
      o: bind
  nc_config:
    driver: local
    driver_opts:
      type: none
      device: ${NC_VOL}/config
      o: bind
  nc_custom_apps:
    driver: local
    driver_opts:
      type: none
      device: ${NC_VOL}/custom_apps
      o: bind
  nc_data:
    driver: local
    driver_opts:
      type: none
      device: ${NC_VOL}/data
      o: bind

networks:
  ncnet:
    internal: true
    name: MyNCnet
